<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车型信息详情</title>
    <link rel="stylesheet" href="../components/common.css">
    <style>
        /* ===== 信息分组 ===== */
        .info-section { margin-bottom: 28px; }
        .info-section-title {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .info-section-title::before {
            content: ''; display: inline-block; width: 3px; height: 16px; background: var(--primary); border-radius: 2px;
        }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 32px; }
        .info-grid.cols-1 { grid-template-columns: 1fr; }
        .info-field { display: flex; flex-direction: column; gap: 2px; }
        .info-field.col-span-2 { grid-column: span 2; }
        .info-field .field-label { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
        .info-field .field-value { font-size: 14px; color: var(--text-primary); line-height: 1.6; min-height: 22px; }
        .info-field .field-value.empty { color: var(--text-disabled); }

        /* ===== 编辑态表单 ===== */
        .form-section { margin-bottom: 28px; }
        .form-section .section-title {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .form-section .section-title::before {
            content: ''; display: inline-block; width: 3px; height: 16px; background: var(--primary); border-radius: 2px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 32px; }
        .form-grid.cols-1 { grid-template-columns: 1fr; }
        .form-item { display: flex; flex-direction: column; gap: 6px; }
        .form-item label { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .form-item .required { color: var(--error); margin-right: 4px; }
        .form-item input, .form-item select, .form-item textarea {
            height: 32px; border: 1px solid var(--border-input); border-radius: var(--radius);
            padding: 0 12px; font-size: 14px; color: var(--text-primary); background: var(--bg-container);
            outline: none; font-family: inherit;
        }
        .form-item input:focus, .form-item select:focus, .form-item textarea:focus {
            border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,.1);
        }
        .form-item input::placeholder, .form-item textarea::placeholder { color: var(--text-disabled); }
        .form-item input.readonly, .form-item select.readonly { background: #f5f5f5; color: var(--text-secondary); cursor: not-allowed; }
        .form-item textarea { height: auto; min-height: 80px; padding: 8px 12px; resize: vertical; }

        /* ===== 底部操作栏 ===== */
        .edit-footer-bar {
            position: fixed; bottom: 0; left: var(--sidebar-width); right: 0;
            height: var(--footer-bar-height); background: var(--bg-container);
            border-top: 1px solid var(--border-color);
            display: none; align-items: center; justify-content: flex-end; gap: 12px;
            padding-right: 24px; z-index: 5; box-shadow: 0 -2px 8px rgba(0,0,0,.06);
        }
        .edit-footer-bar.show { display: flex; }

        /* ===== 变更日志 ===== */
        .changelog-section { margin-top: 32px; padding-top: 24px; border-top: 2px solid var(--border-color); }
        .changelog-section .section-title { margin-bottom: 16px; }
        .sub-action-bar { display: flex; align-items: center; justify-content: flex-end; margin-bottom: 12px; gap: 8px; }
        .log-type-modify { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; line-height: 20px; background: #e6f4ff; color: #1677ff; }
        .log-type-delete { display: inline-block; padding: 2px 10px; border-radius: 10px; font-size: 12px; line-height: 20px; background: #fff2f0; color: #ff4d4f; }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
        <div id="header"></div>
        <div class="content">
            <div class="page-container">
                <!-- 页面头部 -->
                <div class="page-header">
                    <div class="page-title" id="pageTitle">车型信息详情</div>
                    <div style="display:flex;align-items:center;gap:8px">
                        <button class="btn" onclick="goBack()">关闭</button>
                        <button class="btn btn-primary" id="editBtn" onclick="toggleEdit()">编辑</button>
                        <button class="btn btn-primary" id="newVersionBtn" onclick="goNewVersion()">新建版本</button>
                    </div>
                </div>

                <!-- 查看态 -->
                <div id="viewMode">
                    <!-- 车型信息 -->
                    <div class="info-section">
                        <div class="info-section-title">车型信息</div>
                        <div class="info-grid">
                            <div class="info-field"><span class="field-label">车型来源</span><span class="field-value" id="v_model_source">—</span></div>
                            <div class="info-field"><span class="field-label">车型名称（中）</span><span class="field-value" id="v_model_name">—</span></div>
                            <div class="info-field"><span class="field-label">车型名称（英）</span><span class="field-value" id="v_model_name_en">—</span></div>
                            <div class="info-field"><span class="field-label">车型别名</span><span class="field-value" id="v_model_alias">—</span></div>
                            <div class="info-field"><span class="field-label">用途分类</span><span class="field-value" id="v_vehicle_category">—</span></div>
                            <div class="info-field"><span class="field-label">车型编码</span><span class="field-value" id="v_model_code">—</span></div>
                            <div class="info-field"><span class="field-label">编码头</span><span class="field-value" id="v_header_code">—</span></div>
                        </div>
                    </div>

                    <!-- 版本信息 -->
                    <div class="info-section">
                        <div class="info-section-title">版本信息</div>
                        <div class="info-grid">
                            <div class="info-field"><span class="field-label">车型版本</span><span class="field-value" id="v_version">—</span></div>
                            <div class="info-field"><span class="field-label">车辆型号</span><span class="field-value" id="v_vehicle_model">—</span></div>
                            <div class="info-field"><span class="field-label">历史车型编码</span><span class="field-value" id="v_old_model_code">—</span></div>
                            <div class="info-field"><span class="field-label">动力类别</span><span class="field-value" id="v_power_type">—</span></div>
                            <div class="info-field"><span class="field-label">排放标准</span><span class="field-value" id="v_emission_std">—</span></div>
                        </div>
                    </div>

                    <!-- 主要参数信息 -->
                    <div class="info-section">
                        <div class="info-section-title">主要参数信息</div>
                        <div class="info-grid">
                            <div class="info-field"><span class="field-label">底盘厂商</span><span class="field-value" id="v_chassis_mfr">—</span></div>
                            <div class="info-field"><span class="field-label">底盘型号</span><span class="field-value" id="v_chassis_model">—</span></div>
                            <div class="info-field"><span class="field-label">整车厂商</span><span class="field-value" id="v_manufacturer">—</span></div>
                            <div class="info-field"><span class="field-label">最大重量 (KG)</span><span class="field-value" id="v_max_weight">—</span></div>
                            <div class="info-field"><span class="field-label">整车质量 (KG)</span><span class="field-value" id="v_curb_weight">—</span></div>
                            <div class="info-field"><span class="field-label">载重分类</span><span class="field-value" id="v_load_class">—</span></div>
                            <div class="info-field"><span class="field-label">主发动机厂家</span><span class="field-value" id="v_main_eng_mfr">—</span></div>
                            <div class="info-field"><span class="field-label">主发动机型号/驱动电机型号</span><span class="field-value" id="v_main_eng_model">—</span></div>
                            <div class="info-field"><span class="field-label">驱动电机峰值功率 (KW)</span><span class="field-value" id="v_peak_power">—</span></div>
                            <div class="info-field"><span class="field-label">动力电池额定电压/容量(V/Ah)</span><span class="field-value" id="v_battery_spec">—</span></div>
                            <div class="info-field"><span class="field-label">最大清扫宽度(mm)</span><span class="field-value" id="v_max_sweep">—</span></div>
                            <div class="info-field"><span class="field-label">最大冲洗宽度(mm)</span><span class="field-value" id="v_max_wash">—</span></div>
                        </div>
                    </div>

                    <!-- 其他信息 -->
                    <div class="info-section">
                        <div class="info-section-title">其他信息</div>
                        <div class="info-grid cols-1">
                            <div class="info-field col-span-2"><span class="field-label">备注</span><span class="field-value" id="v_remark">—</span></div>
                        </div>
                    </div>

                    <!-- 变更日志 -->
                    <div class="changelog-section">
                        <div class="info-section-title">变更日志</div>
                        <div class="sub-action-bar">
                            <button class="btn" onclick="exportChangelog()"><span class="btn-icon">⤓</span>导出</button>
                        </div>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:100px;text-align:center">操作类型</th>
                                        <th style="width:160px">修改字段</th>
                                        <th style="width:200px">修改前</th>
                                        <th style="width:200px">修改后</th>
                                        <th style="width:120px">操作人</th>
                                        <th style="width:180px">操作时间</th>
                                        <th style="width:120px">操作来源</th>
                                    </tr>
                                </thead>
                                <tbody id="logTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 编辑态 -->
                <div id="editMode" style="display:none">
                    <form id="editForm" onsubmit="return false">
                        <!-- 车型信息 -->
                        <div class="form-section">
                            <div class="section-title">车型信息</div>
                            <div class="form-grid">
                                <div class="form-item"><label>车型来源</label><input type="text" id="e_model_source" class="readonly" readonly></div>
                                <div class="form-item"><label><span class="required">*</span> 车型名称（中）</label><input type="text" id="e_model_name"></div>
                                <div class="form-item"><label>车型名称（英）</label><input type="text" id="e_model_name_en"></div>
                                <div class="form-item"><label><span class="required">*</span> 车型别名</label>
                                    <select id="e_model_alias"><option value="">请选择</option><option>扫路车</option><option>运输车</option><option>小型清洗机</option><option>小型扫路机</option><option>皮卡</option></select>
                                </div>
                                <div class="form-item"><label><span class="required">*</span> 用途分类</label>
                                    <select id="e_vehicle_category"><option value="">请选择</option><option>作业机动车</option><option>非机动车</option><option>乘用车</option><option>其他</option></select>
                                </div>
                                <div class="form-item"><label>车型编码</label><input type="text" id="e_model_code"></div>
                                <div class="form-item"><label><span class="required">*</span> 编码头</label><input type="text" id="e_header_code" class="readonly" readonly></div>
                            </div>
                        </div>

                        <!-- 版本信息 -->
                        <div class="form-section">
                            <div class="section-title">版本信息</div>
                            <div class="form-grid">
                                <div class="form-item"><label><span class="required">*</span> 车型版本</label><input type="text" id="e_version"></div>
                                <div class="form-item"><label><span class="required">*</span> 车辆型号</label><input type="text" id="e_vehicle_model"></div>
                                <div class="form-item"><label>历史车型编码</label><input type="text" id="e_old_model_code" class="readonly" readonly placeholder="暂不处理"></div>
                                <div class="form-item"><label><span class="required">*</span> 动力类别</label>
                                    <select id="e_power_type"><option value="">请选择</option><option>纯电动</option><option>柴油</option><option>汽油</option><option>混动</option><option>天然气</option></select>
                                </div>
                                <div class="form-item"><label><span class="required">*</span> 排放标准</label>
                                    <select id="e_emission_std"><option value="">请选择</option><option>国三</option><option>国四</option><option>国五</option><option>国六</option><option>纯电动</option><option>非道路移动机械</option></select>
                                </div>
                            </div>
                        </div>

                        <!-- 主要参数信息 -->
                        <div class="form-section">
                            <div class="section-title">主要参数信息</div>
                            <div class="form-grid">
                                <div class="form-item"><label><span class="required">*</span> 底盘厂商</label><input type="text" id="e_chassis_mfr"></div>
                                <div class="form-item"><label>底盘型号</label><input type="text" id="e_chassis_model"></div>
                                <div class="form-item"><label><span class="required">*</span> 整车厂商</label><input type="text" id="e_manufacturer"></div>
                                <div class="form-item"><label>最大重量 (KG)</label><input type="number" id="e_max_weight" oninput="calcLoadClass()"></div>
                                <div class="form-item"><label>整车质量 (KG)</label><input type="number" id="e_curb_weight"></div>
                                <div class="form-item"><label>载重分类</label><input type="text" id="e_load_class" class="readonly" readonly placeholder="自动计算"></div>
                                <div class="form-item"><label>主发动机厂家</label><input type="text" id="e_main_eng_mfr"></div>
                                <div class="form-item"><label>主发动机型号/驱动电机型号</label><input type="text" id="e_main_eng_model"></div>
                                <div class="form-item"><label>驱动电机峰值功率 (KW)</label><input type="number" id="e_peak_power"></div>
                                <div class="form-item"><label>动力电池额定电压/容量(V/Ah)</label><input type="text" id="e_battery_spec"></div>
                                <div class="form-item"><label>最大清扫宽度(mm)</label><input type="number" id="e_max_sweep"></div>
                                <div class="form-item"><label>最大冲洗宽度(mm)</label><input type="number" id="e_max_wash"></div>
                            </div>
                        </div>

                        <!-- 其他信息 -->
                        <div class="form-section">
                            <div class="section-title">其他信息</div>
                            <div class="form-grid cols-1">
                                <div class="form-item"><label>备注</label><textarea id="e_remark" maxlength="500"></textarea></div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑态底部操作栏 -->
    <div class="edit-footer-bar" id="editFooterBar">
        <button class="btn btn-lg" onclick="cancelEdit()">取消</button>
        <button class="btn btn-primary btn-lg" onclick="saveEdit()">确定</button>
    </div>
</div>

<script src="../components/common.js"></script>
<script>
// 获取URL参数
const urlParams = new URLSearchParams(window.location.search);
const versionId = parseInt(urlParams.get('id')) || 101;
const modelId = parseInt(urlParams.get('modelId')) || 1;
const pageMode = urlParams.get('mode') || 'view';

Common.initLayout({
    basePath: '../',
    sidebarId: 'sidebar',
    activeMenuId: 'vehicle-model',
    headerId: 'header',
    breadcrumbs: [{ label: '车辆管理', href: './vehicle-model-list.html' }, { label: '车型管理', href: './vehicle-model-list.html' }, { label: '车型信息详情' }],
    headerOptions: { showProject: false }
});

// 模拟车型数据（与列表页一致）
const mockModels = [
    {
        id: 1, model_name: '麒麟清扫车', model_name_en: 'Kirin Sweeper', model_alias: '扫路车', model_code: 'QL-QJ-001', model_source: '自研', header_code: '5100', vehicle_category: '作业机动车',
        versions: [
            { id: 101, version: 'V1.0', vehicle_model: 'C_UN_V0.6', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '麒麟智能汽车', max_weight: 8500, curb_weight: 3200, load_class: '重卡', chassis_mfr: '东风底盘', chassis_model: 'DF-C850', main_eng_mfr: '宁德时代', main_eng_model: 'CATL-200', peak_power: 120, battery_spec: '380V/200Ah', max_sweep_width: 3500, max_wash_width: 2800, remark: '标准版' },
            { id: 102, version: 'V2.0', vehicle_model: 'C_UN_V0.9', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '麒麟智能汽车', max_weight: 9000, curb_weight: 3500, load_class: '重卡', chassis_mfr: '东风底盘', chassis_model: 'DF-C900', main_eng_mfr: '宁德时代', main_eng_model: 'CATL-250', peak_power: 150, battery_spec: '380V/250Ah', max_sweep_width: 4000, max_wash_width: 3000, remark: '加强版，增大清扫宽度' }
        ]
    },
    {
        id: 2, model_name: '爱瑞特纯电动高压冲洗车', model_name_en: 'Airit Electric High Pressure Washer', model_alias: '小型清洗机', model_code: 'ART-GY-001', model_source: '非自研', header_code: '5100', vehicle_category: '作业机动车',
        versions: [
            { id: 201, version: 'V1.0', vehicle_model: 'ART-HP100', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '爱瑞特环保科技', max_weight: 2800, curb_weight: 1500, load_class: '微卡', chassis_mfr: '江淮底盘', chassis_model: 'JH-C28', main_eng_mfr: '比亚迪', main_eng_model: 'BYD-80', peak_power: 80, battery_spec: '320V/100Ah', max_sweep_width: 0, max_wash_width: 2500, remark: '基础冲洗版' }
        ]
    },
    {
        id: 3, model_name: '泰坦智能驾驶洒水车', model_name_en: 'Titan Intelligent Sprinkler', model_alias: '运输车', model_code: 'TT-SS-001', model_source: '自研', header_code: '5100', vehicle_category: '作业机动车',
        versions: [
            { id: 301, version: 'V1.0', vehicle_model: 'TT-SP001', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '泰坦智能科技', max_weight: 12000, curb_weight: 4500, load_class: '重卡', chassis_mfr: '重汽底盘', chassis_model: 'ZQ-C12', main_eng_mfr: '宁德时代', main_eng_model: 'CATL-300', peak_power: 200, battery_spec: '540V/300Ah', max_sweep_width: 0, max_wash_width: 5000, remark: '智能驾驶洒水版' },
            { id: 302, version: 'V1.1', vehicle_model: 'TT-SP002', old_model_code: '', power_type: '混动', emission_std: '国六', manufacturer: '泰坦智能科技', max_weight: 12000, curb_weight: 4800, load_class: '重卡', chassis_mfr: '重汽底盘', chassis_model: 'ZQ-C12H', main_eng_mfr: '潍柴动力', main_eng_model: 'WC-H200', peak_power: 180, battery_spec: '380V/150Ah', max_sweep_width: 0, max_wash_width: 5000, remark: '混动增程版' }

// 变更日志模拟数据
const mockChangelog = [
    { type: '修改', field: '最大重量 (KG)', before: '8000', after: '8500', operator: '王强', time: '2025-06-22 10:30:00', source: 'Web端' },
    { type: '修改', field: '驱动电机峰值功率 (KW)', before: '110', after: '120', operator: '王强', time: '2025-06-22 10:30:00', source: 'Web端' },
    { type: '修改', field: '备注', before: '—', after: '标准版', operator: '李明', time: '2025-05-10 16:00:00', source: 'Web端' },
    { type: '修改', field: '车型名称（中）', before: '麒麟扫地车', after: '麒麟清扫车', operator: '王强', time: '2025-04-01 09:15:00', source: 'Web端' },
];

// 查找当前版本数据
function findVersionData(vid) {
    for (const m of mockModels) {
        const v = m.versions.find(x => x.id === vid);
        if (v) return { model: m, version: v };
    }
    return { model: mockModels[0], version: mockModels[0].versions[0] };
}

const { model, version } = findVersionData(versionId);

// 渲染查看态
function renderView() {
    document.getElementById('v_model_source').textContent = model.model_source;
    document.getElementById('v_model_name').textContent = model.model_name;
    document.getElementById('v_model_name_en').textContent = model.model_name_en || '—';
    document.getElementById('v_model_alias').textContent = model.model_alias;
    document.getElementById('v_vehicle_category').textContent = model.vehicle_category;
    document.getElementById('v_model_code').textContent = model.model_code || '—';
    document.getElementById('v_header_code').textContent = model.header_code;

    document.getElementById('v_version').textContent = version.version;
    document.getElementById('v_vehicle_model').textContent = version.vehicle_model;
    document.getElementById('v_old_model_code').textContent = version.old_model_code || '—';
    document.getElementById('v_power_type').textContent = version.power_type;
    document.getElementById('v_emission_std').textContent = version.emission_std;

    document.getElementById('v_chassis_mfr').textContent = version.chassis_mfr;
    document.getElementById('v_chassis_model').textContent = version.chassis_model || '—';
    document.getElementById('v_manufacturer').textContent = version.manufacturer;
    document.getElementById('v_max_weight').textContent = version.max_weight || '—';
    document.getElementById('v_curb_weight').textContent = version.curb_weight || '—';
    document.getElementById('v_load_class').textContent = version.load_class || '—';
    document.getElementById('v_main_eng_mfr').textContent = version.main_eng_mfr || '—';
    document.getElementById('v_main_eng_model').textContent = version.main_eng_model || '—';
    document.getElementById('v_peak_power').textContent = version.peak_power || '—';
    document.getElementById('v_battery_spec').textContent = version.battery_spec || '—';
    document.getElementById('v_max_sweep').textContent = version.max_sweep_width || '—';
    document.getElementById('v_max_wash').textContent = version.max_wash_width || '—';
    document.getElementById('v_remark').textContent = version.remark || '—';
}

// 渲染编辑态表单值
function renderEditForm() {
    document.getElementById('e_model_source').value = model.model_source;
    document.getElementById('e_model_name').value = model.model_name;
    document.getElementById('e_model_name_en').value = model.model_name_en || '';
    document.getElementById('e_model_alias').value = model.model_alias;
    document.getElementById('e_vehicle_category').value = model.vehicle_category;
    document.getElementById('e_model_code').value = model.model_code || '';
    document.getElementById('e_header_code').value = model.header_code;

    document.getElementById('e_version').value = version.version;
    document.getElementById('e_vehicle_model').value = version.vehicle_model;
    document.getElementById('e_old_model_code').value = version.old_model_code || '';
    document.getElementById('e_power_type').value = version.power_type;
    document.getElementById('e_emission_std').value = version.emission_std;

    document.getElementById('e_chassis_mfr').value = version.chassis_mfr;
    document.getElementById('e_chassis_model').value = version.chassis_model || '';
    document.getElementById('e_manufacturer').value = version.manufacturer;
    document.getElementById('e_max_weight').value = version.max_weight || '';
    document.getElementById('e_curb_weight').value = version.curb_weight || '';
    document.getElementById('e_load_class').value = version.load_class || '';
    document.getElementById('e_main_eng_mfr').value = version.main_eng_mfr || '';
    document.getElementById('e_main_eng_model').value = version.main_eng_model || '';
    document.getElementById('e_peak_power').value = version.peak_power || '';
    document.getElementById('e_battery_spec').value = version.battery_spec || '';
    document.getElementById('e_max_sweep').value = version.max_sweep_width || '';
    document.getElementById('e_max_wash').value = version.max_wash_width || '';
    document.getElementById('e_remark').value = version.remark || '';
}

// 渲染变更日志
function renderChangelog() {
    const tbody = document.getElementById('logTableBody');
    tbody.innerHTML = mockChangelog.map(log => {
        const typeClass = log.type === '修改' ? 'log-type-modify' : 'log-type-delete';
        return `<tr>
            <td style="text-align:center"><span class="${typeClass}">${log.type}</span></td>
            <td>${log.field || '—'}</td>
            <td>${log.before || '—'}</td>
            <td>${log.after || '—'}</td>
            <td>${log.operator}</td>
            <td>${log.time}</td>
            <td>${log.source}</td>
        </tr>`;
    }).join('');
}

function calcLoadClass() {
    const w = parseFloat(document.getElementById('e_max_weight').value);
    let cls = '';
    if (w >= 8000) cls = '重卡';
    else if (w > 3000) cls = '轻卡';
    else if (w > 0) cls = '微卡';
    document.getElementById('e_load_class').value = cls;
}

function toggleEdit() {
    document.getElementById('viewMode').style.display = 'none';
    document.getElementById('editMode').style.display = 'block';
    document.getElementById('editFooterBar').classList.add('show');
    document.getElementById('editBtn').style.display = 'none';
    document.getElementById('newVersionBtn').style.display = 'none';
    document.getElementById('pageTitle').textContent = '编辑车型信息';
    renderEditForm();
}

function cancelEdit() {
    document.getElementById('viewMode').style.display = 'block';
    document.getElementById('editMode').style.display = 'none';
    document.getElementById('editFooterBar').classList.remove('show');
    document.getElementById('editBtn').style.display = '';
    document.getElementById('newVersionBtn').style.display = '';
    document.getElementById('pageTitle').textContent = '车型信息详情';
}

function saveEdit() {
    // 简单校验
    const req = ['e_model_name','e_model_alias','e_vehicle_category','e_version','e_vehicle_model','e_power_type','e_emission_std','e_chassis_mfr','e_manufacturer'];
    for (const id of req) {
        if (!document.getElementById(id).value.trim()) {
            Common.toast('请填写必填项');
            document.getElementById(id).focus();
            return;
        }
    }
    Common.toast('保存成功');
    cancelEdit();
    renderView();
}

function goBack() {
    window.location.href = './vehicle-model-list.html';
}

function goNewVersion() {
    window.location.href = `./vehicle-model-new-version.html?modelId=${modelId}&baseVersionId=${versionId}`;
}

function exportChangelog() {
    Common.toast('导出成功：车型变更日志_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.xlsx');
}

// 初始化
renderView();
renderChangelog();

// 如果URL mode=edit，自动进入编辑态
if (pageMode === 'edit') {
    toggleEdit();
}
</script>
</body>
</html>
