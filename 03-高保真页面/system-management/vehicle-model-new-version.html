<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新建车型版本</title>
    <link rel="stylesheet" href="../components/common.css">
    <style>
        /* ===== 表单分组 ===== */
        .form-section { margin-bottom: 28px; }
        .form-section .section-title {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .form-section .section-title::before {
            content: ''; display: inline-block; width: 3px; height: 16px; background: var(--primary); border-radius: 2px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 32px; }
        .form-grid.cols-1 { grid-template-columns: 1fr; }
        .form-item { display: flex; flex-direction: column; gap: 6px; }
        .form-item label { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .form-item .required { color: var(--error); margin-right: 4px; }
        .form-item input, .form-item select, .form-item textarea {
            height: 32px; border: 1px solid var(--border-input); border-radius: var(--radius);
            padding: 0 12px; font-size: 14px; color: var(--text-primary); background: var(--bg-container);
            outline: none; font-family: inherit;
        }
        .form-item input:focus, .form-item select:focus, .form-item textarea:focus {
            border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,.1);
        }
        .form-item input::placeholder, .form-item textarea::placeholder { color: var(--text-disabled); }
        .form-item input.readonly, .form-item select.readonly { background: #f5f5f5; color: var(--text-secondary); cursor: not-allowed; }
        .form-item textarea { height: auto; min-height: 80px; padding: 8px 12px; resize: vertical; }
        .radio-group { display: flex; align-items: center; gap: 20px; height: 32px; }
        .radio-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-primary); cursor: pointer; }
        .radio-group input[type="radio"] { accent-color: var(--primary); }

        /* ===== 底部操作栏 ===== */
        .footer-bar {
            position: fixed; bottom: 0; left: var(--sidebar-width); right: 0;
            height: var(--footer-bar-height); background: var(--bg-container);
            border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: flex-end; gap: 12px;
            padding-right: 24px; z-index: 5; box-shadow: 0 -2px 8px rgba(0,0,0,.06);
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
        <div id="header"></div>
        <div class="content">
            <div class="page-container">
                <div class="page-header">
                    <div class="page-title">新建车型版本</div>
                    <div><button class="btn" onclick="window.location.href='./vehicle-model-list.html'">返回</button></div>
                </div>

                <form id="versionForm" onsubmit="return false">
                    <!-- 车型信息（继承自原车型，不可编辑） -->
                    <div class="form-section">
                        <div class="section-title">车型信息（继承）</div>
                        <div class="form-grid">
                            <div class="form-item"><label>车型来源</label><input type="text" id="v_model_source" class="readonly" readonly></div>
                            <div class="form-item"><label>车型名称（中）</label><input type="text" id="v_model_name" class="readonly" readonly></div>
                            <div class="form-item"><label>车型名称（英）</label><input type="text" id="v_model_name_en" class="readonly" readonly></div>
                            <div class="form-item"><label>车型别名</label><input type="text" id="v_model_alias" class="readonly" readonly></div>
                            <div class="form-item"><label>用途分类</label><input type="text" id="v_vehicle_category" class="readonly" readonly></div>
                            <div class="form-item"><label>车型编码</label><input type="text" id="v_model_code" class="readonly" readonly></div>
                            <div class="form-item"><label>编码头</label><input type="text" id="v_header_code" class="readonly" readonly></div>
                        </div>
                    </div>

                    <!-- 版本信息（需重新填写） -->
                    <div class="form-section">
                        <div class="section-title">版本信息（需填写）</div>
                        <div class="form-grid">
                            <div class="form-item">
                                <label><span class="required">*</span> 车型版本</label>
                                <input type="text" id="v_version" placeholder="请输入新版本号，不可与已有版本重复">
                            </div>
                            <div class="form-item">
                                <label><span class="required">*</span> 车辆型号</label>
                                <input type="text" id="v_vehicle_model" placeholder="如 C_UN_V0.6">
                            </div>
                            <div class="form-item">
                                <label>历史车型编码</label>
                                <input type="text" id="v_old_model_code" class="readonly" readonly placeholder="暂不处理">
                            </div>
                            <div class="form-item">
                                <label><span class="required">*</span> 动力类别</label>
                                <select id="v_power_type">
                                    <option value="">请选择</option>
                                    <option>纯电动</option><option>柴油</option><option>汽油</option><option>混动</option><option>天然气</option>
                                </select>
                            </div>
                            <div class="form-item">
                                <label><span class="required">*</span> 排放标准</label>
                                <select id="v_emission_std">
                                    <option value="">请选择</option>
                                    <option>国三</option><option>国四</option><option>国五</option><option>国六</option><option>纯电动</option><option>非道路移动机械</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- 主要参数信息（继承但可修改） -->
                    <div class="form-section">
                        <div class="section-title">主要参数信息</div>
                        <div class="form-grid">
                            <div class="form-item">
                                <label><span class="required">*</span> 底盘厂商</label>
                                <input type="text" id="v_chassis_mfr" placeholder="请输入底盘厂商">
                            </div>
                            <div class="form-item">
                                <label>底盘型号</label>
                                <input type="text" id="v_chassis_model" placeholder="请输入底盘型号">
                            </div>
                            <div class="form-item">
                                <label><span class="required">*</span> 整车厂商</label>
                                <input type="text" id="v_manufacturer" placeholder="请输入整车厂商">
                            </div>
                            <div class="form-item">
                                <label>最大重量 (KG)</label>
                                <input type="number" id="v_max_weight" placeholder="请输入最大重量" oninput="calcLoadClass()">
                            </div>
                            <div class="form-item">
                                <label>整车质量 (KG)</label>
                                <input type="number" id="v_curb_weight" placeholder="请输入整车质量">
                            </div>
                            <div class="form-item">
                                <label>载重分类</label>
                                <input type="text" id="v_load_class" class="readonly" readonly placeholder="根据最大重量自动计算">
                            </div>
                            <div class="form-item">
                                <label>主发动机厂家</label>
                                <input type="text" id="v_main_eng_mfr" placeholder="请输入主发动机厂家">
                            </div>
                            <div class="form-item">
                                <label>主发动机型号/驱动电机型号</label>
                                <input type="text" id="v_main_eng_model" placeholder="请输入型号">
                            </div>
                            <div class="form-item">
                                <label>驱动电机峰值功率 (KW)</label>
                                <input type="number" id="v_peak_power" placeholder="请输入功率">
                            </div>
                            <div class="form-item">
                                <label>动力电池额定电压/容量(V/Ah)</label>
                                <input type="text" id="v_battery_spec" placeholder="如 380V/200Ah">
                            </div>
                            <div class="form-item">
                                <label>最大清扫宽度(mm)</label>
                                <input type="number" id="v_max_sweep" placeholder="请输入清扫宽度">
                            </div>
                            <div class="form-item">
                                <label>最大冲洗宽度(mm)</label>
                                <input type="number" id="v_max_wash" placeholder="请输入冲洗宽度">
                            </div>
                        </div>
                    </div>

                    <!-- 其他信息（继承但可修改） -->
                    <div class="form-section">
                        <div class="section-title">其他信息</div>
                        <div class="form-grid cols-1">
                            <div class="form-item">
                                <label>备注</label>
                                <textarea id="v_remark" maxlength="500" placeholder="请输入备注信息，最多500字"></textarea>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 底部操作栏 -->
<div class="footer-bar">
    <button class="btn btn-lg" onclick="window.location.href='./vehicle-model-list.html'">取消</button>
    <button class="btn btn-primary btn-lg" onclick="doSave()">确定</button>
</div>

<script src="../components/common.js"></script>
<script>
const urlParams = new URLSearchParams(window.location.search);
const modelId = parseInt(urlParams.get('modelId')) || 1;
const baseVersionId = parseInt(urlParams.get('baseVersionId')) || 101;

Common.initLayout({
    basePath: '../',
    sidebarId: 'sidebar',
    activeMenuId: 'vehicle-model',
    headerId: 'header',
    breadcrumbs: [{ label: '系统管理', href: './vehicle-model-list.html' }, { label: '车型管理', href: './vehicle-model-list.html' }, { label: '新建车型版本' }],
    headerOptions: { showProject: false }
});

// 模拟车型数据
const mockModels = [
    {
        id: 1, model_name: '麒麟清扫车', model_name_en: 'Kirin Sweeper', model_alias: '扫路车', model_code: 'QL-QJ-001', model_source: '自研', header_code: '5100', vehicle_category: '作业机动车',
        versions: [
            { id: 101, version: 'V1.0', vehicle_model: 'C_UN_V0.6', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '麒麟智能汽车', max_weight: 8500, curb_weight: 3200, load_class: '重卡', chassis_mfr: '东风底盘', chassis_model: 'DF-C850', main_eng_mfr: '宁德时代', main_eng_model: 'CATL-200', peak_power: 120, battery_spec: '380V/200Ah', max_sweep_width: 3500, max_wash_width: 2800, remark: '标准版' },
            { id: 102, version: 'V2.0', vehicle_model: 'C_UN_V0.9', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '麒麟智能汽车', max_weight: 9000, curb_weight: 3500, load_class: '重卡', chassis_mfr: '东风底盘', chassis_model: 'DF-C900', main_eng_mfr: '宁德时代', main_eng_model: 'CATL-250', peak_power: 150, battery_spec: '380V/250Ah', max_sweep_width: 4000, max_wash_width: 3000, remark: '加强版，增大清扫宽度' }
        ]
    },
    {
        id: 2, model_name: '爱瑞特纯电动高压冲洗车', model_name_en: 'Airit Electric High Pressure Washer', model_alias: '小型清洗机', model_code: 'ART-GY-001', model_source: '非自研', header_code: '5100', vehicle_category: '作业机动车',
        versions: [
            { id: 201, version: 'V1.0', vehicle_model: 'ART-HP100', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '爱瑞特环保科技', max_weight: 2800, curb_weight: 1500, load_class: '微卡', chassis_mfr: '江淮底盘', chassis_model: 'JH-C28', main_eng_mfr: '比亚迪', main_eng_model: 'BYD-80', peak_power: 80, battery_spec: '320V/100Ah', max_sweep_width: 0, max_wash_width: 2500, remark: '基础冲洗版' }
        ]
    },
    {
        id: 3, model_name: '泰坦智能驾驶洒水车', model_name_en: 'Titan Intelligent Sprinkler', model_alias: '运输车', model_code: 'TT-SS-001', model_source: '自研', header_code: '5100', vehicle_category: '作业机动车',
        versions: [
            { id: 301, version: 'V1.0', vehicle_model: 'TT-SP001', old_model_code: '', power_type: '纯电动', emission_std: '纯电动', manufacturer: '泰坦智能科技', max_weight: 12000, curb_weight: 4500, load_class: '重卡', chassis_mfr: '重汽底盘', chassis_model: 'ZQ-C12', main_eng_mfr: '宁德时代', main_eng_model: 'CATL-300', peak_power: 200, battery_spec: '540V/300Ah', max_sweep_width: 0, max_wash_width: 5000, remark: '智能驾驶洒水版' },
            { id: 302, version: 'V1.1', vehicle_model: 'TT-SP002', old_model_code: '', power_type: '混动', emission_std: '国六', manufacturer: '泰坦智能科技', max_weight: 12000, curb_weight: 4800, load_class: '重卡', chassis_mfr: '重汽底盘', chassis_model: 'ZQ-C12H', main_eng_mfr: '潍柴动力', main_eng_model: 'WC-H200', peak_power: 180, battery_spec: '380V/150Ah', max_sweep_width: 0, max_wash_width: 5000, remark: '混动增程版' }
        ]
    }
];

function findData() {
    for (const m of mockModels) {
        if (m.id === modelId) {
            const v = m.versions.find(x => x.id === baseVersionId) || m.versions[0];
            return { model: m, version: v };
        }
    }
    return { model: mockModels[0], version: mockModels[0].versions[0] };
}

const { model, version } = findData();

// 自动填充表单
function fillForm() {
    // 车型信息（只读）
    document.getElementById('v_model_source').value = model.model_source;
    document.getElementById('v_model_name').value = model.model_name;
    document.getElementById('v_model_name_en').value = model.model_name_en || '';
    document.getElementById('v_model_alias').value = model.model_alias;
    document.getElementById('v_vehicle_category').value = model.vehicle_category;
    document.getElementById('v_model_code').value = model.model_code || '';
    document.getElementById('v_header_code').value = model.header_code;

    // 版本信息（需重新填写，但填充原值供参考）
    document.getElementById('v_vehicle_model').value = '';
    document.getElementById('v_version').value = '';
    document.getElementById('v_old_model_code').value = '';
    document.getElementById('v_power_type').value = version.power_type;
    document.getElementById('v_emission_std').value = version.emission_std;

    // 主要参数（继承但可修改）
    document.getElementById('v_chassis_mfr').value = version.chassis_mfr;
    document.getElementById('v_chassis_model').value = version.chassis_model || '';
    document.getElementById('v_manufacturer').value = version.manufacturer;
    document.getElementById('v_max_weight').value = version.max_weight || '';
    document.getElementById('v_curb_weight').value = version.curb_weight || '';
    document.getElementById('v_load_class').value = version.load_class || '';
    document.getElementById('v_main_eng_mfr').value = version.main_eng_mfr || '';
    document.getElementById('v_main_eng_model').value = version.main_eng_model || '';
    document.getElementById('v_peak_power').value = version.peak_power || '';
    document.getElementById('v_battery_spec').value = version.battery_spec || '';
    document.getElementById('v_max_sweep').value = version.max_sweep_width || '';
    document.getElementById('v_max_wash').value = version.max_wash_width || '';

    // 其他信息
    document.getElementById('v_remark').value = version.remark || '';
}

function calcLoadClass() {
    const w = parseFloat(document.getElementById('v_max_weight').value);
    let cls = '';
    if (w >= 8000) cls = '重卡';
    else if (w > 3000) cls = '轻卡';
    else if (w > 0) cls = '微卡';
    document.getElementById('v_load_class').value = cls;
}

function doSave() {
    // 必填校验
    const reqIds = [
        'v_version','v_vehicle_model','v_power_type','v_emission_std',
        'v_chassis_mfr','v_manufacturer'
    ];
    for (const id of reqIds) {
        const el = document.getElementById(id);
        if (!el.value.trim()) {
            Common.toast('请填写必填项：' + el.previousElementSibling.textContent.replace('*', '').trim());
            el.focus();
            return;
        }
    }

    // 版本号唯一性校验（模拟）
    const newVer = document.getElementById('v_version').value.trim();
    const existing = model.versions.find(v => v.version === newVer);
    if (existing) {
        Common.toast('该车型下已存在版本 ' + newVer + '，请更换版本号');
        document.getElementById('v_version').focus();
        return;
    }

    Common.toast('保存成功：已创建新版本 ' + newVer);
    setTimeout(() => {
        window.location.href = './vehicle-model-list.html';
    }, 800);
}

fillForm();
</script>
</body>
</html>
