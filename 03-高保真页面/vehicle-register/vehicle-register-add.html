<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>车辆建档 - 新增</title>
    <link rel="stylesheet" href="../components/common.css">
    <style>
        /* ===== 表单分组 ===== */
        .form-section { margin-bottom: 28px; }
        .form-section .section-title {
            font-size: 15px; font-weight: 600; color: var(--text-primary);
            padding-bottom: 12px; border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .form-section .section-title::before {
            content: ''; display: inline-block; width: 3px; height: 16px; background: var(--primary); border-radius: 2px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 32px; }
        .form-grid.cols-1 { grid-template-columns: 1fr; }
        .form-item { display: flex; flex-direction: column; gap: 6px; }
        .form-item label { font-size: 14px; color: var(--text-secondary); line-height: 1.5; }
        .form-item .required { color: var(--error); margin-right: 4px; }
        .form-item input, .form-item select, .form-item textarea {
            height: 32px; border: 1px solid var(--border-input); border-radius: var(--radius);
            padding: 0 12px; font-size: 14px; color: var(--text-primary); background: var(--bg-container);
            outline: none; font-family: inherit;
        }
        .form-item input:focus, .form-item select:focus, .form-item textarea:focus {
            border-color: var(--primary); box-shadow: 0 0 0 2px rgba(22,119,255,.1);
        }
        .form-item input::placeholder, .form-item textarea::placeholder { color: var(--text-disabled); }
        .form-item input.readonly, .form-item select.readonly { background: #f5f5f5; color: var(--text-secondary); cursor: not-allowed; }
        .form-item textarea { height: auto; min-height: 80px; padding: 8px 12px; resize: vertical; }
        .form-item .hint { font-size: 12px; color: var(--text-disabled); margin-top: 2px; }
        .radio-group { display: flex; align-items: center; gap: 20px; height: 32px; }
        .radio-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; color: var(--text-primary); cursor: pointer; }
        .radio-group input[type="radio"] { accent-color: var(--primary); }

        /* ===== 上传 ===== */
        .upload-area { display: flex; flex-wrap: wrap; gap: 12px; }
        .upload-item {
            width: 104px; height: 104px; border: 1px dashed var(--border-input); border-radius: var(--radius);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: border-color .2s; position: relative; background: var(--bg-container);
        }
        .upload-item:hover { border-color: var(--primary); }
        .upload-icon { font-size: 24px; color: var(--text-disabled); }
        .upload-text { font-size: 12px; color: var(--text-disabled); margin-top: 4px; }
        .upload-item .remove-btn {
            position: absolute; top: -6px; right: -6px; width: 18px; height: 18px; border-radius: 50%;
            background: var(--error); color: #fff; display: flex; align-items: center; justify-content: center;
            font-size: 12px; cursor: pointer; line-height: 1;
        }

        /* ===== 动态表格 ===== */
        .dynamic-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
        .dynamic-table thead th { background: #fafafa; color: var(--text-secondary); font-weight: 600; font-size: 13px; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border-color); white-space: nowrap; }
        .dynamic-table tbody td { padding: 6px 8px; border-bottom: 1px solid var(--border-color); }
        .dynamic-table tbody td input, .dynamic-table tbody td select {
            width: 100%; height: 28px; border: 1px solid var(--border-input); border-radius: var(--radius-sm);
            padding: 0 6px; font-size: 13px; color: var(--text-primary); outline: none; background: var(--bg-container);
        }
        .dynamic-table tbody td input:focus { border-color: var(--primary); }
        .remove-row-btn { color: var(--error); font-size: 13px; cursor: pointer; }
        .remove-row-btn:hover { text-decoration: underline; }
        .add-row-btn { display: inline-flex; align-items: center; gap: 4px; color: var(--primary); font-size: 14px; cursor: pointer; padding: 8px 0; }
        .add-row-btn:hover { color: var(--primary-hover); }

        /* ===== 底部操作栏 ===== */
        .footer-bar {
            position: fixed; bottom: 0; left: var(--sidebar-width); right: 0;
            height: var(--footer-bar-height); background: var(--bg-container);
            border-top: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: flex-end; gap: 12px;
            padding-right: 24px; z-index: 5; box-shadow: 0 -2px 8px rgba(0,0,0,.06);
        }
    </style>
</head>
<body>
<div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
        <div id="header"></div>
        <div class="content">
            <div class="page-container">
                <div class="page-header">
                    <div class="page-title">新增车辆信息</div>
                    <div><button class="btn" onclick="window.location.href='./vehicle-register-list.html'">返回</button></div>
                </div>

                <form id="addForm" onsubmit="return false">
                    <!-- 车辆基础信息 -->
                    <div class="form-section">
                        <div class="section-title">车辆基础信息</div>
                        <div class="form-grid">
                            <div class="form-item"><label><span class="required">*</span> 车架号</label><input type="text" id="f_vin" placeholder="请输入17位车架号" maxlength="17"></div>
                            <div class="form-item"><label>国标车架号</label><input type="text" id="f_gbt_vin" placeholder="请输入国标车架号"></div>
                            <div class="form-item"><label>车牌号</label><input type="text" id="f_plate" placeholder="请输入车牌号"></div>
                            <div class="form-item"><label>出厂编号</label><input type="text" id="f_factory" placeholder="请输入出厂编号"></div>
                            <div class="form-item"><label><span class="required">*</span> 是否为测试车</label><div class="radio-group"><label><input type="radio" name="isTest" value="1"> 是</label><label><input type="radio" name="isTest" value="0" checked> 否</label></div></div>
                            <div class="form-item"><label><span class="required">*</span> 是否支持联网</label><div class="radio-group"><label><input type="radio" name="isNetwork" value="1" checked> 是</label><label><input type="radio" name="isNetwork" value="0"> 否</label></div></div>
                            <div class="form-item"><label>网联编号</label><input type="text" id="f_iot" placeholder="请输入网联编号"></div>
                        </div>
                    </div>

                    <!-- 归属信息 -->
                    <div class="form-section">
                        <div class="section-title">归属信息</div>
                        <div class="form-grid">
                            <div class="form-item"><label>所在城市</label><input type="text" id="f_city" placeholder="请输入所在城市"></div>
                            <div class="form-item"><label><span class="required">*</span> 归属项目</label><select id="f_project"><option value="">请选择</option><option>嘉定研发</option><option>椒北街道</option><option>经开东区项目</option><option>镜湖区项目</option><option>鸠江江北项目</option><option>鸠江开发区项目</option><option>鸠江项目</option><option>陵水项目</option></select></div>
                            <div class="form-item"><label><span class="required">*</span> 运营负责人</label><input type="text" id="f_operator" placeholder="请输入运营负责人"></div>
                            <div class="form-item"><label><span class="required">*</span> 资产来源</label><select id="f_source"><option value="">请选择</option><option>外购</option><option>租赁</option><option>融资租赁</option><option>借用</option><option>自研</option></select></div>
                            <div class="form-item"><label><span class="required">*</span> 资产分类</label><select id="f_class"><option value="">请选择</option><option>固定资产</option></select></div>
                            <div class="form-item"><label>合同主体</label><select id="f_entity"><option value="">请选择</option><option>北京XXX科技有限公司</option><option>上海XXX信息技术有限公司</option></select></div>
                            <div class="form-item"><label>固定资产编码</label><input type="text" id="f_asset_code" placeholder="请输入"></div>
                            <div class="form-item"><label><span class="required">*</span> 资产属性</label><select id="f_attr"><option value="">请选择</option><option>非机动车</option><option>运营车辆-电动</option><option>运营车辆-油动</option><option>智能驾驶设备</option><option>运输设备</option><option>乘用车</option></select></div>
                        </div>
                    </div>

                    <!-- 车辆照片 -->
                    <div class="form-section">
                        <div class="section-title">车辆照片</div>
                        <div class="form-grid">
                            <div class="form-item"><label>车辆正面</label><div class="upload-area"><div class="upload-item" onclick="simulateUpload(this)"><span class="upload-icon">＋</span><span class="upload-text">上传照片</span></div></div></div>
                            <div class="form-item"><label>车头45°</label><div class="upload-area"><div class="upload-item" onclick="simulateUpload(this)"><span class="upload-icon">＋</span><span class="upload-text">上传照片</span></div></div></div>
                        </div>
                    </div>

                    <!-- 行驶证信息 -->
                    <div class="form-section">
                        <div class="section-title">行驶证信息</div>
                        <div class="form-grid">
                            <div class="form-item"><label>行驶证正面照片</label><div class="upload-area"><div class="upload-item" onclick="simulateUpload(this)"><span class="upload-icon">＋</span><span class="upload-text">上传照片</span></div></div></div>
                            <div class="form-item"><label>行驶证背面照片</label><div class="upload-area"><div class="upload-item" onclick="simulateUpload(this)"><span class="upload-icon">＋</span><span class="upload-text">上传照片</span></div></div></div>
                            <div class="form-item"><label>注册日期</label><input type="date" id="f_reg_date"></div>
                            <div class="form-item"><label>车龄</label><input type="text" id="f_car_age" readonly class="readonly" placeholder="自动计算"></div>
                        </div>
                    </div>

                    <!-- 车型信息 -->
                    <div class="form-section">
                        <div class="section-title">车型信息</div>
                        <div class="form-grid">
                            <div class="form-item"><label><span class="required">*</span> 车型名称（中）</label><select id="f_model_name"><option value="">请选择</option><option>爱瑞特纯电动高压冲洗车</option><option>长城多用途货车</option><option>独角兽</option><option>麒麟清扫车</option><option>麒麟无人化扫地车</option><option>三力洒水车</option><option>泰坦智能驾驶洒水车</option><option>中联清洗车</option></select></div>
                            <div class="form-item"><label>车型版本</label><select id="f_model_ver"><option value="">请选择</option><option>标准版</option><option>加强版</option><option>豪华版</option></select></div>
                            <div class="form-item"><label>车辆类别</label><input type="text" readonly class="readonly" id="f_category"></div>
                            <div class="form-item"><label>别名</label><input type="text" readonly class="readonly" id="f_alias"></div>
                            <div class="form-item"><label>车型分类</label><input type="text" readonly class="readonly" id="f_mclass"></div>
                            <div class="form-item"><label>动力类别</label><input type="text" readonly class="readonly" id="f_power"></div>
                            <div class="form-item"><label>排放标准</label><input type="text" readonly class="readonly" id="f_emission"></div>
                            <div class="form-item"><label>总质量（KG）</label><input type="text" readonly class="readonly" id="f_total_w"></div>
                            <div class="form-item"><label>整备质量（KG）</label><input type="text" readonly class="readonly" id="f_curb_w"></div>
                            <div class="form-item"><label>整车厂商</label><input type="text" readonly class="readonly" id="f_mfr"></div>
                            <div class="form-item"><label>整车型号</label><input type="text" readonly class="readonly" id="f_mno"></div>
                            <div class="form-item"><label>底盘厂家</label><input type="text" readonly class="readonly" id="f_chassis_mfr"></div>
                            <div class="form-item"><label>底盘型号</label><input type="text" readonly class="readonly" id="f_chassis_no"></div>
                            <div class="form-item"><label>主发动机厂家</label><input type="text" readonly class="readonly" id="f_eng_mfr"></div>
                            <div class="form-item"><label>主发动机型号/驱动电机型号</label><input type="text" readonly class="readonly" id="f_eng_no"></div>
                            <div class="form-item"><label>驱动电机峰值功率 (KW)</label><input type="text" readonly class="readonly" id="f_eng_power"></div>
                        </div>
                    </div>

                    <!-- 车辆功能配置 -->
                    <div class="form-section">
                        <div class="section-title">车辆功能配置</div>
                        <div class="form-grid">
                            <div class="form-item"><label>功能类型</label><input type="text" id="f_func_type" placeholder="请输入功能类型"></div>
                            <div class="form-item"><label>车辆别名</label><input type="text" id="f_v_alias" placeholder="请输入车辆别名"></div>
                            <div class="form-item"><label>历史图片</label><div class="radio-group"><label><input type="radio" name="historyImg" value="1"> 是</label><label><input type="radio" name="historyImg" value="0"> 否</label></div></div>
                            <div class="form-item"><label>历史视频</label><div class="radio-group"><label><input type="radio" name="historyVideo" value="1"> 有</label><label><input type="radio" name="historyVideo" value="0"> 无</label></div></div>
                            <div class="form-item"><label>实时视频</label><select id="f_realtime"><option value="">请选择</option><option>腾讯云</option><option>WebRTC</option><option>GB28181</option><option>新GB28181</option><option>无</option></select></div>
                            <div class="form-item"><label>平行驾驶座舱通过</label><div class="radio-group"><label><input type="radio" name="parallelCockpit" value="1"> 有</label><label><input type="radio" name="parallelCockpit" value="0"> 无</label></div></div>
                            <div class="form-item"><label>网联协议</label><select id="f_protocol"><option value="">请选择</option><option>新网联</option><option>旧网联</option><option>无</option></select></div>
                        </div>
                    </div>

                    <!-- 备注 -->
                    <div class="form-section">
                        <div class="section-title">备注</div>
                        <div class="form-grid cols-1">
                            <div class="form-item"><label>备注</label><textarea id="f_remark" maxlength="500" placeholder="请输入备注信息，最多500字"></textarea></div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- 底部操作栏 -->
<div class="footer-bar">
    <button class="btn btn-lg" onclick="window.location.href='./vehicle-register-list.html'">取消</button>
    <button class="btn btn-primary btn-lg" onclick="doSave()">确定</button>
</div>

<script src="../components/common.js"></script>
<script>
Common.initLayout({
    basePath: '../',
    sidebarId: 'sidebar',
    activeMenuId: 'vehicle-register',
    headerId: 'header',
    breadcrumbs: [
        { label: '车辆管理' },
        { label: '车辆建档', href: './vehicle-register-list.html' },
        { label: '新增车辆信息' },
    ],
    headerOptions: { showProject: false }
});

function simulateUpload(el) {
    el.innerHTML = '<div style="text-align:center;padding-top:30px;font-size:28px">📷</div><div style="font-size:12px;color:var(--text-secondary);padding:4px">已上传</div><span class="remove-btn" onclick="event.stopPropagation();removeUpload(this.parentElement)">✕</span>';
}
function removeUpload(el) {
    el.innerHTML = '<span class="upload-icon">＋</span><span class="upload-text">上传照片</span>';
    el.onclick = function(){ simulateUpload(el); };
}

function doSave() {
    const vin = document.getElementById('f_vin').value.trim();
    if (!vin) { Common.showToast('请输入车架号', 'error'); document.getElementById('f_vin').focus(); return; }
    const project = document.getElementById('f_project').value;
    if (!project) { Common.showToast('请选择归属项目', 'error'); return; }
    const modelName = document.getElementById('f_model_name').value;
    if (!modelName) { Common.showToast('请选择车型名称', 'error'); return; }
    Common.showToast('保存成功', 'success');
    setTimeout(() => window.location.href = './vehicle-register-list.html', 800);
}
</script>
</body>
</html>
